# =======================================================================
# DocuVault Final — Docker Compose
#
# Complete the TODO sections so that `docker-compose up` starts the
# full 3-node cluster with no additional setup.
#
# Architecture:
#   Client → coordinator (port 8080) → storage-a (port 9001)
#                                     → storage-b (port 9002)
# =======================================================================

version: "3.8"

services:

  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    ports:
      - "8080:8080"
    environment:
      DOCUVAULT_SECRET: "s3cr3t-docuvault-key"
      LOCK_TIMEOUT_SECONDS: "5"
      STORAGE_A_HOST: storage-a
      STORAGE_A_PORT: "9001"
      STORAGE_B_HOST: storage-b
      STORAGE_B_PORT: "9002"
      USERS_FILE: /data/users.txt
    networks:
      - docuvault-net
    depends_on:
      - storage-a
      - storage-b

  storage-a:
    build:
      context: .
      dockerfile: Dockerfile.storage
    command: ["./docuvault_storage", "--port", "9001"]
    environment:
      DOCUVAULT_SECRET: "s3cr3t-docuvault-key"
    networks:
      - docuvault-net

  storage-b:
    build:
      context: .
      dockerfile: Dockerfile.storage
    command: ["./docuvault_storage", "--port", "9002"]
    environment:
      DOCUVAULT_SECRET: "s3cr3t-docuvault-key"
    networks:
      - docuvault-net

networks:
  docuvault-net:
    driver: bridge